name: Build & Package Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-package:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build release
        run: cargo build --release

      - name: Build tray hook
        run: cargo build -p nl-tray-hook --release

      - name: Stage files
        run: |
          mkdir staging
          Copy-Item target/release/neverliie-statusbar.exe staging/
          Copy-Item target/release/nl_tray_hook.dll staging/

      - name: Create Velopack Release
        run: |
          vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
          vpk pack -u NeverLiieStatusBar -v ${{ steps.version.outputs.VERSION }} -p ./staging -e neverliie-statusbar.exe
          vpk upload github --repoUrl https://github.com/${{ github.repository }} --publish --tag v${{ steps.version.outputs.VERSION }} --token ${{ secrets.GITHUB_TOKEN }}
